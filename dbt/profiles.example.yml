# Copy to ~/.dbt/profiles.yml (or set DBT_PROFILES_DIR) and fill in your
# BigQuery project. This is only needed to run the dbt models against a real
# warehouse; the Python pipeline does not require dbt to run.
attribution:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth          # uses your gcloud Application Default Credentials
      project: "{{ env_var('GOOGLE_CLOUD_PROJECT') }}"
      dataset: attribution
      location: US
      threads: 4
      priority: interactive
