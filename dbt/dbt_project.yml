name: "attribution"
version: "1.0.0"
config-version: 2

profile: "attribution"

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Build the medallion-style attribution layer on BigQuery.
#   staging  -> cleaned GA4 events
#   marts    -> session-stitched journeys, channel paths, attribution windows
models:
  attribution:
    staging:
      +materialized: view
    marts:
      +materialized: table

vars:
  # Rolling attribution window applied during path construction.
  attribution_window_days: 30
  conversion_event_name: "purchase"
